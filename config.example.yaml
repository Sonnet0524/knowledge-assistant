# Knowledge Assistant Configuration
# Copy this file to 'config.yaml' and customize as needed

# Template Configuration
template_dir: ./templates
output_dir: ./output

# Default Values
default_author: Knowledge Assistant
date_format: "%Y-%m-%d"

# Template-Specific Settings
templates:
  daily-note:
    enabled: true
    auto_date: true
    default_tags:
      - daily
      - journal
  
  research-note:
    enabled: true
    default_tags:
      - research
      - notes
  
  meeting-minutes:
    enabled: true
    default_tags:
      - meeting
      - work
  
  task-list:
    enabled: true
    default_tags:
      - tasks
      - productivity
  
  knowledge-card:
    enabled: true
    default_tags:
      - knowledge
      - learning

# Editor Settings
editor:
  default: vscode
  line_length: 100

# File Naming Convention
naming:
  include_date: true
  date_prefix: true
  format: "{date}_{title}"
